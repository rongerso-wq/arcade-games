<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <title>DONKEY KONG — Classic 1981</title>
  <link rel="stylesheet" href="cabinet.css">
  <style>
    :root {
      --stripe1: #ff6600;
      --stripe2: #882200;
      --marquee-bg: linear-gradient(90deg, #1a0a00, #331500, #1a0a00);
      --marquee-border: #ff6600;
      --marquee-glow: rgba(255,102,0,0.5);
      --marquee-color: #ff6600;
    }
    canvas { display:block; image-rendering:pixelated; }
    #ui, #info { display:none; }
  </style>
</head>
<body>
<div id="ui"></div>
<div class="cabinet-wrap">
  <div class="cab-marquee">
    <div class="cab-marquee-title">★ DONKEY KONG ★</div>
    <div class="cab-marquee-sub">NINTENDO · 1981</div>
  </div>
  <div class="cab-scores">
    <span class="s-label">1UP </span><span class="s-val" id="score">00000</span>
    &nbsp;&nbsp;
    <span class="s-label">HI </span><span class="s-hi" id="hiscore">00000</span>
    &nbsp;&nbsp;
    <span class="s-label">LEVEL </span><span class="s-val" id="level">01</span>
    &nbsp;&nbsp;
    <span class="s-label">LIVES </span><span class="s-val" id="lives">♥ ♥ ♥</span>
  </div>
  <div class="cab-monitor">
    <canvas id="canvas"></canvas>
  </div>
  <div class="cab-controls">
    <div class="cab-buttons">
      <div class="cab-stick"></div>
      <div class="cab-btn red"></div>
    </div>
    <div class="cab-help">← → MOVE · ↑ ↓ LADDER · SPACE JUMP</div>
    <div class="cab-coin">INSERT COIN</div>
    <a class="cab-back" href="arcade.html">◀ ARCADE</a>
  </div>
</div>
<div id="info"></div>

<script>
// ── Canvas ────────────────────────────────────────────────────────────────────
const CW = 448, CH = 560;
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width = CW; canvas.height = CH;

// ── Audio ─────────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(f, d, type='square', v=0.12) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(v, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+d);
    o.start(); o.stop(AC.currentTime+d);
  } catch(_) {}
}
const sndJump    = () => { tone(523,0.06,'square',0.1); tone(659,0.06,'square',0.1); };
const sndDie     = () => { [440,330,220,165,110].forEach((f,i)=>setTimeout(()=>tone(f,0.08,'sawtooth',0.15),i*70)); };
const sndHammer  = () => tone(660,0.05,'square',0.15);
const sndSmash   = () => { tone(200,0.1,'sawtooth',0.2); tone(150,0.12,'sawtooth',0.18); };
const sndWin     = () => { [523,659,784,1047,784,659,523].forEach((f,i)=>setTimeout(()=>tone(f,0.1,'square',0.15),i*80)); };
const sndScore   = () => tone(1047,0.05,'square',0.1);
const sndStepUp  = () => tone(880,0.04,'square',0.07);

// ── Level layout ──────────────────────────────────────────────────────────────
// Platforms: [{x1,x2,y,dir}]  dir = rolling direction for barrels
const PLATS = [
  {x1:0,   x2:448, y:475, dir:'r'}, // P0 floor
  {x1:0,   x2:420, y:400, dir:'r'}, // P1
  {x1:28,  x2:448, y:325, dir:'l'}, // P2
  {x1:0,   x2:420, y:250, dir:'r'}, // P3
  {x1:28,  x2:448, y:175, dir:'l'}, // P4
  {x1:100, x2:448, y:100, dir:'r'}, // P5 top (DK)
];

// Ladders: [{x, y1, y2}]  y1=top, y2=bottom
const LADDERS = [
  {x:380, y1:PLATS[1].y, y2:PLATS[0].y},  // L0: P0→P1
  {x:80,  y1:PLATS[2].y, y2:PLATS[1].y},  // L1: P1→P2
  {x:370, y1:PLATS[3].y, y2:PLATS[2].y},  // L2: P2→P3
  {x:80,  y1:PLATS[4].y, y2:PLATS[3].y},  // L3: P3→P4
  {x:280, y1:PLATS[5].y, y2:PLATS[4].y},  // L4: P4→P5
];

// Hammer pickups: [{x,y,platIdx}]
const HAMMER_SPOTS = [
  {x:200, platIdx:2},  // on P2
  {x:200, platIdx:4},  // on P4
];

// ── Constants ─────────────────────────────────────────────────────────────────
const MW = 16, MH = 20;          // Mario width/height
const GRAVITY     = 0.45;
const JUMP_VY     = -9.5;
const WALK_SPD    = 2.5;
const CLIMB_SPD   = 2;
const BARREL_SPD  = 2.2;
const BARREL_R    = 8;
const HAMMER_DUR  = 480;          // frames hammer lasts

// DK and Pauline positions
const DK_X = 160, DK_Y = PLATS[5].y - 36;
const PAU_X = 400, PAU_Y = PLATS[5].y - 20;

// Oil drum (bottom left)
const DRUM_X = 24, DRUM_Y = PLATS[0].y - 24;

// ── Game state ────────────────────────────────────────────────────────────────
let score = 0, hiScore = 0, lives = 3, level = 1;
let gstate = 'IDLE'; // IDLE|PLAYING|DYING|WIN|GAMEOVER
let mario, barrels, hammers, popups;
let dk = { throwTimer:0, throwInterval:160, arm:0 };
let fc = 0, dieTimer = 0, winTimer = 0;

function resetMario() {
  mario = {
    x: 30, y: PLATS[0].y - MH,
    vx: 0, vy: 0,
    dir: 1,        // 1=right, -1=left
    onGround: true,
    onLadder: false, ladderRef: null,
    hammerTimer: 0,
    state: 'walk', // walk|climb|jump|dead
    frame: 0, frameT: 0,
    lastBarrelScore: new Set(), // barrels already scored for jump
  };
}

function startGame() {
  score = 0; lives = 3; level = 1;
  startLevel();
}

function startLevel() {
  resetMario();
  barrels = [];
  hammers = HAMMER_SPOTS.map(h => ({
    x: h.x,
    y: PLATS[h.platIdx].y - 14,
    active: true,
  }));
  popups = [];
  dk.throwTimer = 0;
  dk.throwInterval = Math.max(60, 160 - level * 15);
  dk.arm = 0;
  fc = 0;
  gstate = 'PLAYING';
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent   = String(score).padStart(5,'0');
  document.getElementById('hiscore').textContent = String(hiScore).padStart(5,'0');
  document.getElementById('level').textContent   = String(level).padStart(2,'0');
  document.getElementById('lives').textContent   = '♥ '.repeat(Math.max(0,lives)).trim() || '---';
}

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (AC.state==='suspended') AC.resume();
  const was = keys[e.code];
  keys[e.code] = true;
  if (e.code==='Space' || e.code==='ArrowUp' || e.code==='ArrowDown') e.preventDefault();

  if (gstate==='IDLE'||gstate==='GAMEOVER') {
    if (e.code==='Space'||e.key==='Enter') startGame();
    return;
  }
  // Jump on press (not hold)
  if (!was && e.code==='Space' && gstate==='PLAYING') {
    tryJump();
  }
  if (!was && e.code==='ArrowUp' && gstate==='PLAYING' && !mario.onLadder) {
    tryLadder('up');
  }
  if (!was && e.code==='ArrowDown' && gstate==='PLAYING' && !mario.onLadder) {
    tryLadder('down');
  }
});
window.addEventListener('keyup', e => { delete keys[e.code]; });

// ── Physics helpers ───────────────────────────────────────────────────────────
function platUnder(x, y) {
  // Returns the platform Mario is standing on (feet at y), or null
  for (const p of PLATS) {
    if (y >= p.y - 2 && y <= p.y + 4 && x + MW/2 > p.x1 && x + MW/2 < p.x2) return p;
  }
  return null;
}

function platBelow(x, y) {
  // First platform below a given y-level (for barrel landing)
  const cx = x;
  for (let i = 0; i < PLATS.length; i++) {
    const p = PLATS[i];
    if (p.y > y && cx > p.x1 && cx < p.x2) return p;
  }
  return null;
}

function ladderAt(x, y) {
  // Returns ladder if x is near it and y is within its range
  return LADDERS.find(l => Math.abs((x+MW/2) - l.x) < 12 && y+MH > l.y1 && y < l.y2) || null;
}

function tryJump() {
  if (mario.state==='dead') return;
  if (mario.onLadder) { mario.onLadder = false; mario.ladderRef = null; return; }
  if (mario.onGround) {
    mario.vy = JUMP_VY; mario.onGround = false; mario.state = 'jump';
    sndJump();
  }
}

function tryLadder(dir) {
  if (mario.state==='dead') return;
  const l = ladderAt(mario.x, mario.y);
  if (!l) return;
  if (dir==='up'   && mario.y + MH <= l.y2 + 2) {
    mario.onLadder = true; mario.ladderRef = l;
    mario.x = l.x - MW/2; mario.onGround = false; mario.vy = 0;
  }
  if (dir==='down' && mario.y >= l.y1 - 4) {
    mario.onLadder = true; mario.ladderRef = l;
    mario.x = l.x - MW/2; mario.onGround = false; mario.vy = 0;
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  lastTs = ts; fc++;
  if (gstate==='IDLE'||gstate==='GAMEOVER') { draw(); return; }

  if (gstate==='DYING') {
    dieTimer--;
    if (dieTimer <= 0) {
      lives--;
      updateHUD();
      if (lives <= 0) {
        if (score>hiScore) { hiScore=score; updateHUD(); }
        gstate='GAMEOVER';
      } else {
        startLevel();
      }
    }
    draw(); return;
  }

  if (gstate==='WIN') {
    winTimer--;
    if (winTimer<=0) { level++; startLevel(); }
    draw(); return;
  }

  updateMario();
  updateDK();
  updateBarrels();
  updatePopups();
  checkWin();
  draw();
}

function updateMario() {
  if (mario.state==='dead') return;

  // Hammer timer
  if (mario.hammerTimer > 0) {
    mario.hammerTimer--;
    if (mario.hammerTimer === 0) mario.state = mario.onLadder ? 'climb' : 'walk';
  }

  mario.frameT++;
  if (mario.frameT >= 8) { mario.frameT = 0; mario.frame ^= 1; }

  if (mario.onLadder) {
    const l = mario.ladderRef;
    if (keys['ArrowUp'])   { mario.y -= CLIMB_SPD; if(fc%6===0) sndStepUp(); }
    if (keys['ArrowDown']) { mario.y += CLIMB_SPD; }

    // Reached top of ladder → step onto upper platform
    if (mario.y + MH <= l.y1 + 4) {
      mario.y = l.y1 - MH;
      mario.onLadder = false; mario.ladderRef = null;
      mario.onGround = true; mario.state = 'walk';
    }
    // Reached bottom of ladder → step onto lower platform
    if (mario.y + MH >= l.y2 - 2) {
      mario.y = l.y2 - MH;
      mario.onLadder = false; mario.ladderRef = null;
      mario.onGround = true; mario.state = 'walk';
    }
    return;
  }

  // Horizontal movement
  if (keys['ArrowLeft'])  { mario.x -= WALK_SPD; mario.dir = -1; }
  if (keys['ArrowRight']) { mario.x += WALK_SPD; mario.dir =  1; }
  mario.x = Math.max(0, Math.min(CW - MW, mario.x));

  // Gravity
  if (!mario.onGround) {
    mario.vy += GRAVITY;
    mario.y  += mario.vy;
  }

  // Platform collision
  mario.onGround = false;
  for (const p of PLATS) {
    const feet = mario.y + MH;
    const cx   = mario.x + MW/2;
    if (mario.vy >= 0 && feet >= p.y - 1 && feet <= p.y + mario.vy + 2 &&
        cx > p.x1 && cx < p.x2) {
      mario.y = p.y - MH;
      mario.vy = 0;
      mario.onGround = true;
      mario.state = mario.hammerTimer > 0 ? 'hammer' : 'walk';
      break;
    }
  }

  // Fall off screen → die
  if (mario.y > CH + 20) killMario();

  // Grab ladder while walking (mid-ladder grab)
  if (mario.onGround && (keys['ArrowUp'] || keys['ArrowDown'])) {
    tryLadder(keys['ArrowUp'] ? 'up' : 'down');
  }

  // Hammer pickup
  hammers.forEach(h => {
    if (!h.active) return;
    if (Math.abs(mario.x - h.x) < 20 && Math.abs(mario.y - h.y) < 20) {
      h.active = false;
      mario.hammerTimer = HAMMER_DUR;
      mario.state = 'hammer';
      sndHammer();
    }
  });

  // Jump-over-barrel scoring (only when in air going up)
  if (!mario.onGround && mario.vy < 0) {
    barrels.forEach(b => {
      if (mario.lastBarrelScore.has(b)) return;
      if (Math.abs((mario.x+MW/2) - b.x) < 22 && Math.abs((mario.y+MH/2) - b.y) < 24) {
        mario.lastBarrelScore.add(b);
        score += 100;
        if (score>hiScore) hiScore=score;
        updateHUD();
        sndScore();
        popups.push({ x:b.x, y:b.y-14, txt:'+100', t:40 });
      }
    });
  } else {
    mario.lastBarrelScore.clear();
  }
}

function updateDK() {
  dk.throwTimer++;
  dk.arm = dk.throwTimer > dk.throwInterval - 30 ? 1 : 0;
  if (dk.throwTimer >= dk.throwInterval) {
    dk.throwTimer = 0;
    spawnBarrel();
  }
}

function spawnBarrel() {
  barrels.push({
    x: DK_X + 28,
    y: PLATS[5].y - BARREL_R - 2,
    vx: BARREL_SPD,
    vy: 0,
    platIdx: 5,
    state: 'roll', // roll|fall
    rot: 0,
  });
}

function updateBarrels() {
  const lv = level;
  barrels = barrels.filter(b => {
    if (b.state === 'roll') {
      b.x += b.vx;
      b.rot += b.vx > 0 ? 0.15 : -0.15;

      const plat = PLATS[b.platIdx];

      // Check edge → start falling
      if (b.vx > 0 && b.x + BARREL_R > plat.x2) {
        b.state = 'fall'; b.vx = 0; b.vy = 1;
      } else if (b.vx < 0 && b.x - BARREL_R < plat.x1) {
        b.state = 'fall'; b.vx = 0; b.vy = 1;
      }

      // Kill Mario
      if (!mario.onLadder && mario.state !== 'dead') {
        const dx = Math.abs(b.x - (mario.x+MW/2));
        const dy = Math.abs(b.y - (mario.y+MH/2));
        if (dx < BARREL_R+8 && dy < BARREL_R+10) {
          if (mario.hammerTimer > 0) {
            // Smash!
            score += 500; updateHUD(); sndSmash();
            popups.push({ x:b.x, y:b.y-16, txt:'+500', t:50 });
            return false; // remove barrel
          } else {
            killMario();
          }
        }
      }
    }

    if (b.state === 'fall') {
      b.vy += GRAVITY * 0.9;
      b.y  += b.vy;
      b.rot += 0.05;

      // Land on a platform
      for (let i = b.platIdx - 1; i >= 0; i--) {
        const p = PLATS[i];
        if (b.y + BARREL_R >= p.y && b.y - BARREL_R < p.y + 16 &&
            b.x > p.x1 && b.x < p.x2) {
          b.y     = p.y - BARREL_R;
          b.vy    = 0;
          b.platIdx = i;
          b.state = 'roll';
          b.vx    = p.dir === 'r' ? BARREL_SPD : -BARREL_SPD;
          break;
        }
      }

      // Off screen bottom → remove
      if (b.y > CH + 20) return false;

      // Kill Mario while falling
      if (!mario.onLadder && mario.state !== 'dead') {
        const dx = Math.abs(b.x - (mario.x+MW/2));
        const dy = Math.abs(b.y - (mario.y+MH/2));
        if (dx < BARREL_R+8 && dy < BARREL_R+10) {
          if (mario.hammerTimer > 0) {
            score += 500; updateHUD(); sndSmash();
            popups.push({ x:b.x, y:b.y-16, txt:'+500', t:50 });
            return false;
          } else {
            killMario();
          }
        }
      }
    }

    return true;
  });
}

function killMario() {
  if (mario.state==='dead') return;
  mario.state = 'dead';
  mario.vy = -6; mario.vx = 0;
  sndDie();
  gstate = 'DYING'; dieTimer = 90;
}

function checkWin() {
  // Mario reaches Pauline: x close to PAU_X and on top platform
  if (mario.onGround && mario.state !== 'dead') {
    const feet = mario.y + MH;
    if (Math.abs(feet - PLATS[5].y) < 6 && Math.abs(mario.x+MW/2 - PAU_X) < 28) {
      score += 1000 + fc % 500;
      if (score>hiScore) { hiScore=score; }
      updateHUD();
      sndWin();
      gstate = 'WIN'; winTimer = 180;
    }
  }
}

function updatePopups() {
  popups = popups.filter(p => { p.t--; p.y -= 0.4; return p.t > 0; });
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#000011'; ctx.fillRect(0,0,CW,CH);

  drawPlatforms();
  drawLadders();
  drawDrum();
  drawHammers();
  drawDK();
  drawPauline();
  drawBarrels();
  drawMario();
  drawPopups();
  drawTimerBar();

  if (gstate==='IDLE')
    overlay('DONKEY KONG',['PRESS SPACE TO START','','← → MOVE  ·  SPACE JUMP',
      '↑ ↓ CLIMB LADDERS','GRAB HAMMER TO SMASH BARRELS!','RESCUE PAULINE!']);
  if (gstate==='GAMEOVER')
    overlay('GAME OVER',[
      `SCORE  ${String(score).padStart(5,'0')}`,
      `HI     ${String(hiScore).padStart(5,'0')}`,'','PRESS SPACE TO RETRY']);
  if (gstate==='WIN')
    overlay('RESCUE!',['PAULINE IS SAFE!','','NEXT LEVEL...']);
  if (gstate==='DYING')
    overlay('','');
}

function drawPlatforms() {
  PLATS.forEach((p, i) => {
    // Platform surface
    const grad = ctx.createLinearGradient(0, p.y, 0, p.y+12);
    grad.addColorStop(0, i===5 ? '#885533' : '#4455aa');
    grad.addColorStop(1, i===5 ? '#552200' : '#223388');
    ctx.fillStyle = grad;
    ctx.fillRect(p.x1, p.y, p.x2-p.x1, 12);
    // Top highlight
    ctx.fillStyle = i===5 ? '#aa8866' : '#7788cc';
    ctx.fillRect(p.x1, p.y, p.x2-p.x1, 2);
    // Rivets
    ctx.fillStyle = i===5 ? '#664422' : '#334499';
    for (let rx = p.x1+16; rx < p.x2-8; rx += 28) {
      ctx.beginPath(); ctx.arc(rx, p.y+6, 3, 0, Math.PI*2); ctx.fill();
    }
  });
}

function drawLadders() {
  LADDERS.forEach(l => {
    const w = 10, rungH = 10;
    // Side rails
    ctx.fillStyle = '#886644';
    ctx.fillRect(l.x - w/2 - 2, l.y1, 3, l.y2 - l.y1);
    ctx.fillRect(l.x + w/2,     l.y1, 3, l.y2 - l.y1);
    // Rungs
    ctx.fillStyle = '#aa8866';
    for (let ry = l.y1 + 4; ry < l.y2; ry += rungH) {
      ctx.fillRect(l.x - w/2 - 2, ry, w+4, 2);
    }
  });
}

function drawDrum() {
  // Oil drum
  const x = DRUM_X, y = DRUM_Y;
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(x, y+4, 18, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.fillRect(x-18, y-20, 36, 24);
  ctx.fillStyle = '#333';
  ctx.fillRect(x-18, y-2, 36, 4);
  ctx.fillRect(x-18, y-10, 36, 3);
  // Fire
  const ft = Math.sin(fc*0.2);
  ctx.fillStyle = '#ff4400'; ctx.beginPath(); ctx.arc(x, y-24+ft*2, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(x-4, y-22+ft, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(x+3, y-26+ft*1.5, 3, 0, Math.PI*2); ctx.fill();
}

function drawHammers() {
  hammers.forEach(h => {
    if (!h.active) return;
    // Handle
    ctx.fillStyle = '#aa7733';
    ctx.fillRect(h.x+2, h.y+4, 4, 10);
    // Head
    ctx.fillStyle = '#888888';
    ctx.fillRect(h.x-2, h.y, 12, 6);
    // Highlight
    ctx.fillStyle = '#aaaaaa';
    ctx.fillRect(h.x-2, h.y, 12, 2);
    // Glow
    ctx.strokeStyle = `rgba(255,200,0,${0.4+0.3*Math.sin(fc*0.15)})`;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(h.x-3, h.y-1, 14, 15);
  });
}

function drawDK() {
  ctx.save();
  ctx.translate(DK_X, DK_Y);

  // Body
  ctx.fillStyle = '#774422';
  ctx.beginPath(); ctx.ellipse(0, 8, 18, 16, 0, 0, Math.PI*2); ctx.fill();
  // Belly
  ctx.fillStyle = '#cc9966';
  ctx.beginPath(); ctx.ellipse(0, 12, 10, 10, 0, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#885533';
  ctx.beginPath(); ctx.ellipse(0, -12, 14, 13, 0, 0, Math.PI*2); ctx.fill();
  // Face
  ctx.fillStyle = '#cc9966';
  ctx.beginPath(); ctx.ellipse(2, -9, 8, 8, 0, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4,-14,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4,-14,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-3,-14,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5,-14,1.5,0,Math.PI*2); ctx.fill();
  // Nostrils
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(0,-8,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-8,2,0,Math.PI*2); ctx.fill();

  // Arms (raised when throwing)
  const armY = dk.arm ? -8 : 4;
  ctx.fillStyle = '#774422';
  ctx.beginPath(); ctx.ellipse(-24, armY, 7, 5, dk.arm?-0.5:0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 24, armY, 7, 5, dk.arm?0.5:-0.3, 0, Math.PI*2); ctx.fill();
  // Fists
  ctx.fillStyle = '#885533';
  ctx.beginPath(); ctx.arc(-28, armY-2, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 28, armY-2, 5, 0, Math.PI*2); ctx.fill();

  // Legs
  ctx.fillStyle = '#663311';
  ctx.fillRect(-14, 20, 10, 14);
  ctx.fillRect(4,   20, 10, 14);

  ctx.restore();
}

function drawPauline() {
  ctx.save();
  ctx.translate(PAU_X, PAU_Y);

  // Dress
  ctx.fillStyle = '#ff4488';
  ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(-10,16); ctx.lineTo(10,16); ctx.lineTo(6,0); ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle = '#ffaacc';
  ctx.fillRect(-5,-10,10,12);
  // Head
  ctx.fillStyle = '#ffddaa';
  ctx.beginPath(); ctx.arc(0,-16,7,0,Math.PI*2); ctx.fill();
  // Hair
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(0,-20,6,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-5,-16,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5,-16,3,0,Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-2,-16,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 2,-16,1.2,0,Math.PI*2); ctx.fill();
  // Wave arms (animation)
  const wt = Math.sin(fc*0.1);
  ctx.fillStyle = '#ffddaa';
  ctx.fillRect(-12, -8+wt*2, 6, 3);
  ctx.fillRect(  6, -8-wt*2, 6, 3);
  // Help text
  ctx.fillStyle = '#ffaacc';
  ctx.font = 'bold 7px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('HELP!', 0, -28);

  ctx.restore();
}

function drawBarrels() {
  barrels.forEach(b => {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);

    // Barrel body
    ctx.fillStyle = '#884422';
    ctx.beginPath(); ctx.arc(0, 0, BARREL_R, 0, Math.PI*2); ctx.fill();
    // Stripes
    ctx.strokeStyle = '#ffcc66';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-BARREL_R+2, 0); ctx.lineTo(BARREL_R-2, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -BARREL_R+2); ctx.lineTo(0, BARREL_R-2); ctx.stroke();
    // Ring
    ctx.strokeStyle = '#cc8844';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0,0,BARREL_R-2,0,Math.PI*2); ctx.stroke();

    ctx.restore();
  });
}

function drawMario() {
  if (mario.state==='dead' && gstate!=='DYING') return;
  ctx.save();
  ctx.translate(mario.x, mario.y);

  if (mario.state==='dead') {
    const t = 1 - dieTimer/90;
    ctx.globalAlpha = Math.max(0, dieTimer/90);
    ctx.translate(MW/2, MH/2);
    ctx.rotate(t * Math.PI * 3);
    ctx.scale(1 - t*0.6, 1 - t*0.6);
    ctx.translate(-MW/2, -MH/2);
  }

  const hasHammer = mario.hammerTimer > 0;
  const dir = mario.dir;
  const f   = mario.frame;

  // HAT
  ctx.fillStyle = '#cc0000';
  ctx.fillRect(2, 0, MW-2, 4);
  ctx.fillRect(0, 2, MW, 3);
  // FACE
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(2, 5, MW-4, 7);
  // MUSTACHE
  ctx.fillStyle = '#884422';
  ctx.fillRect(dir>0?4:2, 10, 10, 2);
  // OVERALLS (blue)
  ctx.fillStyle = '#0044cc';
  ctx.fillRect(2, 12, MW-4, 6);
  // SHIRT (red)
  ctx.fillStyle = '#cc0000';
  ctx.fillRect(0, 12, 4, 5);
  ctx.fillRect(MW-4, 12, 4, 5);
  // LEGS (walk animation)
  const legOff = mario.onLadder ? 0 : (f===0 ? 0 : 3);
  ctx.fillStyle = '#0044cc';
  ctx.fillRect(1,    18, 6, 7 - legOff);
  ctx.fillRect(MW-7, 18, 6, 7 + legOff - 3);
  // SHOES
  ctx.fillStyle = '#663300';
  ctx.fillRect(0,    25-legOff,   7, 3);
  ctx.fillRect(MW-7, 22+legOff-3, 7, 3);

  // HAMMER (when powered up)
  if (hasHammer) {
    const flash = Math.floor(mario.hammerTimer/4) % 2;
    if (flash || mario.hammerTimer > HAMMER_DUR-60) {
      ctx.fillStyle = '#886633';
      ctx.fillRect(dir>0 ? MW-2 : -4, -4, 4, 12);
      ctx.fillStyle = '#aaaaaa';
      ctx.fillRect(dir>0 ? MW-2 : -8, -6, 10, 5);
    }
  }

  ctx.restore();
}

function drawPopups() {
  popups.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.t/20);
    ctx.fillStyle = '#ffff44';
    ctx.font = 'bold 11px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(p.txt, p.x, p.y);
  });
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

function drawTimerBar() {
  if (gstate!=='PLAYING') return;
  // Bonus time indicator
  const timeBonus = Math.max(0, 500 - fc);
  const pct = timeBonus / 500;
  ctx.fillStyle = '#111'; ctx.fillRect(10, CH-12, CW-20, 6);
  ctx.fillStyle = pct>0.5 ? '#44ff44' : pct>0.2 ? '#ffff44' : '#ff4444';
  ctx.fillRect(10, CH-12, (CW-20)*pct, 6);
  ctx.fillStyle = '#333'; ctx.strokeRect(10, CH-12, CW-20, 6);
  ctx.fillStyle = '#446'; ctx.font='7px "Courier New"'; ctx.textAlign='right';
  ctx.fillText('BONUS', CW-12, CH-14);
}

function overlay(title, lines) {
  if (!title) return;
  ctx.fillStyle = 'rgba(0,0,0,0.78)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 24px "Courier New"';
  ctx.shadowBlur=14; ctx.shadowColor='#ff6600';
  ctx.fillText(title, CW/2, CH/2-70);
  ctx.shadowBlur=0;
  ctx.font = '13px "Courier New"';
  lines.forEach((line, i) => {
    ctx.fillStyle = i===0 ? '#ffaa66' : '#664422';
    ctx.fillText(line, CW/2, CH/2-16 + i*24);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
resetMario();
updateHUD();
requestAnimationFrame(ts => { lastTs=ts; requestAnimationFrame(loop); });
</script>

<!-- TOUCH CONTROLS -->
<style>
#touch-controls{position:fixed;bottom:0;left:0;right:0;height:170px;display:flex;
  justify-content:space-between;align-items:flex-end;padding:12px 24px;
  z-index:9999;pointer-events:none;user-select:none;-webkit-user-select:none;}
.dpad{position:relative;width:132px;height:132px;pointer-events:none;}
.dp{position:absolute;width:44px;height:44px;background:rgba(255,255,255,0.22);
  border:2px solid rgba(255,255,255,0.55);border-radius:8px;display:flex;
  align-items:center;justify-content:center;font-size:22px;color:#fff;
  pointer-events:all;touch-action:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.dp:active{background:rgba(255,255,255,0.55);}
#btn-up   {top:0;left:44px;}
#btn-down {bottom:0;left:44px;}
#btn-left {top:44px;left:0;}
#btn-right{top:44px;right:0;}
.act-wrap{display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:all;}
.act{width:64px;height:64px;background:rgba(255,70,70,0.45);
  border:2px solid rgba(255,110,110,0.8);border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:13px;font-weight:bold;
  color:#fff;pointer-events:all;touch-action:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;}
.act:active{background:rgba(255,70,70,0.8);}
</style>
<div id="touch-controls">
  <div class="dpad">
    <div class="dp" id="btn-up">&#9650;</div>
    <div class="dp" id="btn-left">&#9664;</div>
    <div class="dp" id="btn-right">&#9654;</div>
    <div class="dp" id="btn-down">&#9660;</div>
  </div>
  <div class="act-wrap">
    <div class="act" id="btn-fire">FIRE</div>
  </div>
</div>
<script>
(function(){
  function fire(code,type){
    var ek={code:code,key:code==='Space'?' ':code.replace('Arrow',''),bubbles:true,cancelable:true};
    document.dispatchEvent(new KeyboardEvent(type,ek));
    window.dispatchEvent(new KeyboardEvent(type,ek));
  }
  function bind(id,code){
    var el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('touchstart',function(e){e.preventDefault();fire(code,'keydown');},{passive:false});
    el.addEventListener('touchend',  function(e){e.preventDefault();fire(code,'keyup');  },{passive:false});
    el.addEventListener('mousedown', function(){fire(code,'keydown');});
    el.addEventListener('mouseup',   function(){fire(code,'keyup');  });
  }
  bind('btn-up',   'ArrowUp');
  bind('btn-down', 'ArrowDown');
  bind('btn-left', 'ArrowLeft');
  bind('btn-right','ArrowRight');
  bind('btn-fire', 'Space');
})();
</script>
<!-- END TOUCH CONTROLS -->
